<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Leelauu | Coming Soon</title>
    <meta
      name="description"
      content="Leelauu is launching in early Q3 2026. Join the waitlist for launch updates."
    >
    <meta name="theme-color" content="#AD83D9">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Leelauu">
    <meta property="og:url" content="https://leelauu.com/">
    <meta property="og:title" content="Leelauu is coming soon">
    <meta
      property="og:description"
      content="Next gen parental control. Launching early Q3 2026."
    >
    <meta property="og:image" content="https://leelauu.com/assets/social/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Leelauu coming soon preview with mascot">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Leelauu is coming soon">
    <meta
      name="twitter:description"
      content="Next gen parental control. Launching early Q3 2026."
    >
    <meta name="twitter:image" content="https://leelauu.com/assets/social/og-image.png">
    <meta name="twitter:image:alt" content="Leelauu coming soon preview with mascot">
    <link rel="canonical" href="https://leelauu.com/">
    <link rel="icon" href="assets/mascot/mascot-pink.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header" aria-label="Leelauu">
        <a class="brand-link" href="/" aria-label="Leelauu home">
          <img src="assets/logo/logo-purple.svg" alt="Leelauu" width="160" height="36">
        </a>
        <div class="header-actions">
          <p class="launch-pill" data-i18n="launchPill">Early Q3 2026</p>
          <div class="language-switch" role="group" aria-label="Language">
            <button
              class="language-option"
              type="button"
              data-lang-option="en"
              aria-pressed="true"
            >
              EN
            </button>
            <button
              class="language-option"
              type="button"
              data-lang-option="ru"
              aria-pressed="false"
            >
              RU
            </button>
          </div>
        </div>
      </header>

      <main class="hero">
        <section class="hero-art" aria-labelledby="page-title">
          <div class="brand-field" aria-hidden="true"></div>
          <div class="mascot-wrap">
            <img
              class="mascot"
              src="assets/mascot/mascot-pink.svg"
              alt=""
              width="292"
              height="285"
            >
            <h1 id="page-title">
              <span data-i18n="heroTitleLine1">Coming</span><br>
              <span data-i18n="heroTitleLine2">Soon</span>
            </h1>
            <p class="hero-subtitle" data-i18n="heroSubtitle">Next gen parental control</p>
          </div>
        </section>

        <section class="signup" aria-labelledby="signup-title">
          <h2 id="signup-title" data-i18n="signupTitle">Join the launch list</h2>
          <p class="intro" data-i18n="intro">
            Leave your name, email, and phone, and we will send the first update when Leelauu opens.
          </p>

          <form
            class="waitlist-form"
            action="https://api.web3forms.com/submit"
            method="POST"
            data-waitlist-form
          >
            <input type="hidden" name="access_key" value="6fe3c66e-00ed-4de1-a14d-f8bc1c59b067">
            <input type="hidden" name="subject" value="New Leelauu coming soon signup">
            <input type="hidden" name="from_name" value="Leelauu Coming Soon">
            <input type="hidden" name="source" value="Leelauu static coming soon page">
            <input type="hidden" name="language" value="en" data-language-field>
            <label class="bot-field">
              <span data-i18n="botField">Leave this field empty</span>
              <input type="checkbox" name="botcheck" tabindex="-1" autocomplete="off">
            </label>

            <div class="field">
              <label for="name" data-i18n="nameLabel">Name</label>
              <input
                id="name"
                name="name"
                type="text"
                autocomplete="name"
                placeholder="Your name"
                data-i18n-placeholder="namePlaceholder"
                required
              >
            </div>

            <div class="field">
              <label for="email" data-i18n="emailLabel">Email</label>
              <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                placeholder="you@example.com"
                data-i18n-placeholder="emailPlaceholder"
                required
              >
            </div>

            <div class="field">
              <label for="phone" data-i18n="phoneLabel">Phone</label>
              <input
                id="phone"
                name="phone"
                type="tel"
                autocomplete="tel"
                placeholder="+372 5555 1234"
                data-i18n-placeholder="phonePlaceholder"
                required
              >
            </div>

            <button type="submit">
              <span data-i18n="submitCta">Notify me</span>
              <span class="button-arrow" aria-hidden="true">-></span>
            </button>

            <p
              class="form-status"
              role="status"
              aria-live="polite"
              data-form-status
              data-i18n="launchStatus"
            >
              Launching at the beginning of Q3 2026.
            </p>
          </form>
        </section>
      </main>

      <footer class="site-footer">
        <img src="assets/logo/logo-white.svg" alt="Leelauu" width="112" height="25">
        <p data-i18n="footerCopyright">© 2026 Leelauu Software OÜ. All rights reserved.</p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
